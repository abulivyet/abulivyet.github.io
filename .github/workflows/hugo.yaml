name: 自动构建并部署 Hugo 博客

on:
  push:
    branches:
      - main  # 如果你的默认分支叫 master，请改为 master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        # with:
        #   submodules: recursive  # 这一行非常重要，用来拉取 PaperMod 主题
        #   fetch-depth: 0

      - name: 安装 Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true # 必须开启，因为 PaperMod 需要扩展版

      - name: 构建静态网页
        run: hugo --gc --minify

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public # Hugo 生成的文件夹名