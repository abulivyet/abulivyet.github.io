# 核心设置：让首页变成普通页面布局（只显示 _index.md 内容）
[homepage]
  layout = "page"          # 关键：改成 page → 去掉默认 profile/hero/头像/社交等
  showRecent = false       # 关闭首页自动显示“最近文章”列表
  showMoreLink = false     # 如果上面开了，这个也关掉“更多”链接

# 作者信息（既然首页不是 profile 布局，这些基本不显示，可留空或删）
[author]
  name = "A"
  image = ""               # 留空 → 不显示头像
  headline = ""
  bio = ""
  links = []               # 清空社交链接

# 其他可选：让界面更简洁
[header]
  layout = "basic"         # 简洁导航栏（可选：fixed / basic）

[footer]
  showMenu = true
  showAppearanceSwitcher = false   # 隐藏主题切换按钮
  showScrollToTop = false          # 隐藏回到顶部箭头（可选）

# 你原来的其他参数可以保留在文件其他部分，这里只给出修改建议的核心部分